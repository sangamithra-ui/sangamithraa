<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Being Infinity</title>
    <link rel="stylesheet" href="auto.css">
</head>
<body>

    <div id="top">
        <span class="setting">&#9881;</span>
        <span class="online">&#X2022; ONLINE | &#x1F552; - ms</span>
    </div>

    <div class="main">
        <h1>
            <span class="Being">Being</span>
            <span class="Infinity">Infinity</span>
        </h1>

        <p>One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>

        <div class="search-box">
            <span>
                <span class="lens">&#128269;</span>

                
                <input id="search-box" type="text" placeholder="Start typing to search phrases">

            </span>
        </div>

        <div id="suggest-box">
        </div>
    </div>

    <script>

        var searchbox = document.getElementById("search-box");
        var suggestionBox = document.getElementById("suggest-box");   

        searchbox.addEventListener("input", function () {

            //1: get user typed text
            var userInput = searchbox.value;

            if (userInput.trim() == "") {

                suggestionBox.innerHTML = "";
                suggestionBox.style.display = "none";    
                return;

            } else {

                var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url2 = "&algorithm=brute&limit=10&weighted=false";   
                var url = url1 + userInput + url2;                        

            }

            //2: make api call to get suggestion
            fetch(url)
                .then(function (response) {
                    return response.json();
                })

                .then(function (data) {

                    console.log(data);

                    var resultsArray = data.results;
                    var htmlResults = "";

                    for (var i = 0; i < resultsArray.length; i++) {

                        htmlResults += "<div class='suggest-text'>" +
                            resultsArray[i].text +
                            "</div>";

                    }

                    suggestionBox.innerHTML = htmlResults;
                    suggestionBox.style.display = "block";   

                });

            //3: Display data in Html

        });

    </script>

</body>
</html>
